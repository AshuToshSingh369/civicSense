version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0-alpine
    container_name: civicsense_mongodb_prod
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: civicsense
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - civicsense_network
    restart: always
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost:27017/test --username ${MONGO_USER} --password ${MONGO_PASSWORD} || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicsense_backend_prod
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/civicsense?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      ALERT_EMAIL: ${ALERT_EMAIL}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - civicsense_network
    restart: always

  # Frontend Production Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civicsense_frontend_prod
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${API_URL}
      VITE_SOCKET_URL: ${SOCKET_URL}
    depends_on:
      - backend
    networks:
      - civicsense_network
    restart: always

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: civicsense_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - civicsense_network
    restart: always

volumes:
  mongodb_data:
  mongodb_config:

networks:
  civicsense_network:
    driver: bridge
